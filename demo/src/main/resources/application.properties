spring.application.name=demo

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/testfinaldb2
spring.datasource.username=dev
spring.datasource.password=devpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Logging Configuration
logging.level.org.hibernate.SQL=off
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=off
logging.level.com.test.demo=DEBUG
logging.level.com.darpan.security=DEBUG
logging.level.org.springframework.security=DEBUG

# MFA Configuration
# Supported providers: twilio, aws_sns, bird, microsoft
security.mfa-provider=aws_sns

security.cors.enabled=true
security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://test-reusable-library.vercel.app,http://localhost:3000,http://localhost:5173,http://localhost:8080}
security.cors.allowed-methods=*
security.cors.allowed-headers=*
security.cors.exposed-headers=*
security.cors.allow-credentials=true
security.cors.max-age=3600

security.public-endpoints[0]=/auth/register
security.public-endpoints[1]=/auth/login
security.public-endpoints[2]=/auth/refresh
security.public-endpoints[3]=/auth/auth-type
security.public-endpoints[4]=/auth/verify-email
security.public-endpoints[5]=/auth/verify-mfa
security.public-endpoints[6]=/auth/resend-code
security.public-endpoints[7]=/auth/send-mfa-code
security.public-endpoints[8]=/auth/forgot-password
security.public-endpoints[9]=/auth/reset-password
security.public-endpoints[10]=/health

security.csrf.enabled=${CSRF_ENABLED:false}
security.oauth2-success-redirect-url=${OAUTH2_REDIRECT_URL:http://localhost:3000/}

# JWT secret
security.jwt-secret=myVerySecureSecretKeyForHS384Algorithm123456789012345678901234567890
security.jwt-expiration-seconds=900
security.refresh-token-expiration-seconds=86400

security.role-endpoints[0].pattern=/admin/**
security.role-endpoints[0].roles=ADMIN,MANAGER,GITHUB_ADMIN,GOOGLE_ADMIN,AZURE_ADMIN,OAUTH2_USER

security.role-endpoints[1].pattern=/user/**
security.role-endpoints[1].roles=USER,OIDC_USER,GITHUB_USER,GOOGLE_USER,AZURE_USER

# for github
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.client-name=Github

# for google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.issuer-uri=https://accounts.google.com
spring.security.oauth2.client.registration.google.client-name=Google

# for azure
spring.security.oauth2.client.registration.azure.client-id=${AZURE_CLIENT_ID:}
spring.security.oauth2.client.registration.azure.client-secret=${AZURE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.azure.scope=openid,email,profile,offline_access
spring.security.oauth2.client.registration.azure.redirect-uri={baseUrl}/login/oauth2/code/azure
spring.security.oauth2.client.registration.azure.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.azure.client-name=Microsoft

# Explicit endpoints for multitenant + personal accounts
spring.security.oauth2.client.provider.azure.authorization-uri=https://login.microsoftonline.com/common/oauth2/v2.0/authorize
spring.security.oauth2.client.provider.azure.token-uri=https://login.microsoftonline.com/common/oauth2/v2.0/token
spring.security.oauth2.client.provider.azure.user-info-uri=https://graph.microsoft.com/oidc/userinfo
spring.security.oauth2.client.provider.azure.jwk-set-uri=https://login.microsoftonline.com/common/discovery/v2.0/keys
spring.security.oauth2.client.provider.azure.user-name-attribute=sub

#twilio
messaging.twilio.enabled=true
messaging.twilio.sid=${TWILIO_SID:}
messaging.twilio.token=${TWILIO_TOKEN:}
messaging.twilio.from=${TWILIO_FROM:}

#aws
messaging.sns.enabled=true
messaging.sns.access-key=${AWS_ACCESS_KEY:}
messaging.sns.secret-key=${AWS_SECRET_KEY:}
messaging.sns.region=us-east-1

#messagebird
messaging.bird.enabled=true
messaging.bird.api-key=${BIRD_API_KEY:}
messaging.bird.workspace-id=3623820b-0702-4fd5-992b-7c8ec35544b2
messaging.bird.channel-id=93e5c5aa-1110-58c4-9038-8f5ef31dbceb
messaging.bird.base-url=https://api.bird.com

#azure sms
messaging.microsoft.enabled=true
azure.communication.connection-string=${AZURE_COMMUNICATION_STRING:}
azure.communication.sms.from-phone-number=+919879880177

# --- Agent memory ---
ai.db.agent.memory.max-messages=30
#ai.db.schema.exclude.tables=tokens, user_roles
ai.db.schema.exclude.columns=user.password

# Gmail provider
messaging.mail.enabled=true
messaging.mail.host=smtp.gmail.com
messaging.mail.port=587
messaging.mail.username=${MAIL_USERNAME:}
messaging.mail.password=${MAIL_PASSWORD:}
messaging.mail.starttls=true
messaging.mail.auth=true
messaging.mail.debug=false


#AI provider configuration
#Supported values: openai (default) or ollama or gemini
ai.db.agent.model-provider=gemini

#OpenAI configuration (used when provider=openai)
#langchain4j.openai.api-key=your-openai-api-key
#langchain4j.openai.chat-model.model-name=gpt-4o
#
#Ollama configuration (used when provider=ollama)
#langchain4j.ollama.base-url=http://localhost:11434
#langchain4j.ollama.chat-model.model-name=llama3.2:latest
#
#Gemini configuration (used when provider=gemini)
langchain4j.google-ai-gemini.api-key=${GEMINI_API_KEY:}
langchain4j.google-ai-gemini.chat-model.model-name=gemini-2.5-flash-lite

#gemini-2.5-flash
security.jwt.register.password.pattern=^(?=.*[0-9])(?=.*[a-z])(?=.*[A-Z])(?=.*[@#$%^&+=])(?=\\S+$).{8,20}$
security.jwt.register.password.message=Password must be at least 8 characters long and contain at least one uppercase letter, one lowercase letter, one number, and one special character.

spring.servlet.multipart.max-file-size=10MB
server.tomcat.max-swallow-size=-1

# Rate Limiter Configuration
rate-limiter.enabled=true
rate-limiter.namespace=demo-app
rate-limiter.default-algorithm=TOKEN_BUCKET
rate-limiter.default-limit=3
rate-limiter.default-window-seconds=10
rate-limiter.default-refill-per-second=0.5
rate-limiter.http-filter.enabled=true